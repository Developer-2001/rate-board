runtime: nodejs24
env: standard
service: default

instance_class: F1

entrypoint: npx next start -H 0.0.0.0 -p $PORT

build_env_variables:
  GOOGLE_NODE_RUN_SCRIPTS: "build"

automatic_scaling:
  min_instances: 1
  max_instances: 2
  target_cpu_utilization: 0.65
  target_throughput_utilization: 0.65
